<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="JuGus Do-It" />
  <link rel="apple-touch-icon" href="/logo-ju.png" />
  <title>JuGus Do-It 💪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Pages rendered by router.js -->
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="levelup-modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-emoji" id="modal-emoji">🏆</div>
      <h2 id="modal-title">Niveau supérieur !</h2>
      <p id="modal-desc">Tu as atteint un nouveau rang !</p>
      <button class="modal-btn" onclick="App.closeModal()">Continuons ! 💪</button>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-emoji">⚠️</div>
      <h2 id="confirm-title">Confirmer</h2>
      <p id="confirm-desc"></p>
      <div style="display:flex;gap:12px;margin-top:4px;">
        <button class="modal-btn" style="background:var(--card2);color:var(--text2);box-shadow:none;" onclick="App.closeConfirm(false)">Annuler</button>
        <button class="modal-btn" id="confirm-ok-btn" onclick="App.closeConfirm(true)">Confirmer</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="profile-modal" style="display:none;">
    <div class="modal-card" style="max-height:92vh;overflow-y:auto;">
      <h2 style="color:var(--text);font-size:18px;margin-bottom:16px;">Mon profil</h2>
      <div class="profile-avatar-preview" id="profile-avatar-preview">💪</div>
      <div class="avatar-grid" id="avatar-grid"></div>
      <div class="form-group" style="margin-top:16px;">
        <label>Pseudo</label>
        <input type="text" id="profile-username" maxlength="20" autocomplete="off" />
      </div>
      <p class="form-error" id="profile-error"></p>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button type="button" class="modal-btn" style="background:var(--card2);color:var(--text2);box-shadow:none;" onclick="App.closeProfileModal()">Annuler</button>
        <button type="button" class="modal-btn" id="profile-save-btn" onclick="App.saveProfile()">Enregistrer</button>
      </div>
      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
      <button type="button" onclick="App.closeProfileModal();HomePage.logout()" style="width:100%;background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:6px 0;font-family:inherit;text-align:center;" title="Se déconnecter"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Se déconnecter</button>
    </div>
  </div>

  <script src="/js/notifications.js"></script>
  <script src="/js/api.js"></script>
  <!-- <script src="/js/dev-mock.js"></script> -->
  <script src="/js/gamification.js"></script>
  <script src="/js/minigame.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/app.js"></script>
  <script src="/js/pages/admin.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/pages/muscu.js"></script>
  <script src="/js/router.js"></script>
</body>
</html>
